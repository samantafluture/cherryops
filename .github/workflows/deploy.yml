name: Deploy

on:
  push:
    branches: [main]
    paths: [backend/**, docker-compose.prod.yml, scripts/deploy.sh]

concurrency:
  group: deploy-cherryops
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 187.124.67.117
          username: sam
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd ~/apps/cherryops
            bash scripts/deploy.sh
