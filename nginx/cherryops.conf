server {
    listen 80;
    server_name cherryops.samantafluture.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cherryops.samantafluture.com;

    ssl_certificate     /etc/letsencrypt/live/cherryops.samantafluture.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cherryops.samantafluture.com/privkey.pem;

    # API proxy
    location / {
        proxy_pass http://cherryops-api:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout for long-running task execution
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
