name: Android CI

on:
  push:
    branches: [main]
    paths: [android/**]
  pull_request:
    branches: [main]
    paths: [android/**]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - run: chmod +x gradlew
      - run: ./gradlew lint
      - run: ./gradlew assembleDebug
