name: Android CI

on:
  push:
    branches: [main]
    paths: [android/**, .github/workflows/android-ci.yml]
  pull_request:
    branches: [main]
    paths: [android/**, .github/workflows/android-ci.yml]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      # Firebase requires google-services.json — create a dummy for CI
      - name: Create dummy google-services.json
        run: |
          echo '{"project_info":{"project_number":"000000000000","project_id":"cherryops-ci","storage_bucket":"cherryops-ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"com.cherryops.app"}},"api_key":[{"current_key":"AIzaSyCI-placeholder"}]}],"configuration_version":"1"}' > app/google-services.json

      - run: gradle assembleDebug

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
